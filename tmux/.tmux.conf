##### no status bar #####

# ~/.tmux.conf

# ── Prefix ──────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g extended-keys on
set -g extended-keys-format csi-u
# ── Ghost overlay (no bar look) ──────────────────────
set -g status on
set -g status-style 'bg=default fg=#303030'   # near-invisible on dark bg
set -g status-left ''
set -g status-right ' #S · #I '
set -g status-right-length 30
set -g status-position bottom
set -g window-status-format ''
set -g window-status-current-format ''

# ── Popup: opencode (leader + o) ────────────────────
bind o display-popup -E -w 80% -h 80% 'opencode'

# ── Popup: terminal (leader + t) ────────────────────
bind t display-popup -E -w 80% -h 80% '$SHELL'


# mouse scroll
set -g mouse on

# vim copy mode
setw -g mode-keys vi

# easy yank to tmux clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection

# optional: yank to system clipboard too
# Linux: wl-copy or xclip/xsel
bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "wl-copy"
