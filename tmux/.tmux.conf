##### no status bar #####

# ~/.tmux.conf

# ── Prefix ──────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g extended-keys on
# ── Ghost overlay (no bar look) ──────────────────────
set -g status on
set -g status-style 'bg=default fg=#303030'   # near-invisible on dark bg
set -g status-left ''
set -g status-right ' #S · #I '
set -g status-right-length 30
set -g status-position bottom
set -g window-status-format ''
set -g window-status-current-format ''

# ── Popup: opencode (leader + o) ────────────────────
bind o display-popup -E -w 80% -h 80% 'opencode'

# ── Popup: terminal (leader + t) ────────────────────
bind t display-popup -E -w 80% -h 80% '$SHELL'
